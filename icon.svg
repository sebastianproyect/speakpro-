<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="110" fill="#0f0f1a"/>
  <!-- Gradiente de acento -->
  <rect width="512" height="512" rx="110" fill="url(#bg)" opacity="0.9"/>
  <!-- Brillo superior izquierdo -->
  <ellipse cx="180" cy="150" rx="200" ry="160" fill="url(#glow)"/>

  <!-- Burbuja de texto (speech bubble) -->
  <path d="M96 148 Q96 104 140 104 L372 104 Q416 104 416 148 L416 286 Q416 330 372 330 L270 330 L230 410 L220 330 L140 330 Q96 330 96 286 Z"
    fill="white" opacity="0.12"/>
  <path d="M96 148 Q96 104 140 104 L372 104 Q416 104 416 148 L416 286 Q416 330 372 330 L270 330 L230 410 L220 330 L140 330 Q96 330 96 286 Z"
    fill="none" stroke="white" stroke-width="5" opacity="0.35"/>

  <!-- Letras SP -->
  <text x="256" y="282" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="168" font-weight="900" text-anchor="middle"
    fill="white" letter-spacing="-8">SP</text>

  <!-- Ondas de sonido debajo -->
  <path d="M172 368 Q172 348 172 338" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M155 375 Q148 355 148 340" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M340 368 Q340 348 340 338" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M357 375 Q364 355 364 340" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.35"/>
</svg>
